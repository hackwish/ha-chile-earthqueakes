[tool.semantic_release]
version_variables = [
    "custom_components/chile_earthquakes/manifest.json:version",
]
branch = "main"
build_command = ""

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "N",  # naming
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"const.py" = ["N814"]

[tool.ruff.format]
quote-style = "double"
